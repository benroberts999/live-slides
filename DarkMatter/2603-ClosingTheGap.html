        <section data-markdown>
          <textarea data-template>
            # Atomic Matrix elements

            <br>

            <div style="text-align: left; float: left; width: 50%">

              <h2>Wigner-Eckart theorem</h2>
              <h3>&emsp;• Spherical tensor operators $T^k_\mu$</h3>
              <h3>&emsp;• <span style="color: magenta"><i>Reduced</i> matrix element</span></h3>
              <h3>&emsp;&emsp;&emsp;• Independent of projections $m$, $\mu$</h3>

              <br><br>

              <div class="fragment" style="font-size: 1.2em">
              $$
              {\color{skyblue}\langle{bm_b}|{T^k_\mu}|{am_a}\rangle}
              =
              {\footnotesize\begin{pmatrix}
                  j_b & k & j_a \\
                  -m_b & \mu & m_a \\
              \end{pmatrix}}\,
              {\color{magenta}\langle{b}\|{T^k}\|{a}\rangle},
              $$
              </div>
              <br>
              <br>
              <div class="fragment">
              <h3>&emsp;• Simplifies complicated sums over $m$</h3>
              <br>
              <br> 
              <div style="font-size: 1.2em">
              $$
              \sum_{m_a m_b} {\color{skyblue}\langle{bm_b}|{T^K_Q}|{am_a}\rangle
              \langle{bm_b}|{S^{K'}_{Q'}}|{am_a}\rangle} \qquad\qquad\qquad\\
              \qquad\qquad\qquad
              =\frac{1}{2K+1}
              {\color{magenta}\langle{b}\|{T^K}\|{a}\rangle
              \langle{b}\|{S^{K}}\|{a}\rangle} \, \delta_{KK'}\delta_{QQ'}.
              $$
              </div>
              </div>

            </div>

            <div class="fragment" style="text-align: left; float: right; width: 50%">

              <h2>Vector Spherical Expansion</h2>
              <h3>&emsp;• $e^{iqr}$, $\vec{\alpha}\,e^{iqr}$: <i>not</i> spherical tensors</h3>
              <h3>&emsp;• $t^k$, $T_K$: <i>are</i> (multipole expansion)</h3>

              <br>

              <div class="fragment" style="font-size: 1.25em">
                $$
                \begin{align*}
                e^{i \mathbf{\vec q} \cdot \mathbf{\vec r}} 
                &\propto 
                \sum_{KQ} \, 
                 {\color{orange}{Y^*_{KQ}}{(\hat{\mathbf q})}} \,\, 
                 {\color{skyblue}t^K_{Q}(q,\mathbf{\vec r})}   
                \\
                e^{i\mathbf{\vec q}\cdot\mathbf{\vec r}}\gamma^0\mathbf{\vec \gamma}
                & \propto \sum_{KQ\,\sigma} \, 
                {\color{orange}\mathbf{\vec Y}_{KQ}^{(\sigma)*}(\hat{\mathbf{q}})} \,\, 
                {\color{skyblue}T_{KQ}^{(\sigma)}(q,\mathbf{\vec r})}
                \end{align*}
                $$
              </div>
              <div class="fragment">
              <br>
              <h3>&emsp;• "Electric" ($\sigma=1$), "magnetic" ($\sigma=0$)</h3>
              <h3>&emsp;• "Longitudanal" ($\sigma=-1$)</h3> 
              <br>
              </div>

              <div class="fragment" style="font-size: 1.1em">
              $$
              \begin{equation*}
              \begin{split}
                  \hat{\mathbf{q}}\cdot\mathbf{\vec{Y}}^{(1)}_{KQ} &= \hat{\mathbf{q}}\cdot\vec{Y}^{(0)}_{KQ}  = 0\\
                  \hat{\mathbf{q}}\times\vec{Y}^{(-1)}_{KQ}  &= 0.
              \end{split}
              \end{equation*}
              $$
              </div>



            </div>

          </textarea>
        </section>

            # Dimensionless Atomic Ionisation Formfactors

            <br>
            <div style="text-align: left; float: left; width: 43%">

              <h2>Factors</h2>
              <div class="fragment fade-in">
              <h3>&emsp;• 10 reduced matrix elements (each K)</h3>
              <div style="font-size: 1.5em">
              $$
              \langle {\color{skyblue}f} \| 
               {\color{skyblue}t^k} {\color{red}\tilde \gamma} \| 
              {\color{skyblue}i} \rangle 
              ~,~
              \langle {\color{skyblue}f} \| 
              {\color{skyblue}T^{(\sigma)}_{K}}
              {\color{red}\tilde\gamma}\| 
              {\color{skyblue}i} \rangle 
              $$
              </div>
              
              <br>
              <div class="fragment fade-in">
              $$\begin{align*}
              |M_{ba}|^2 
              &= \sum_{m_f m_i}|\mathcal{M}_{ba}|^2\\
              &= |T_{ba}|^2 + |S_{ba}|^2 - 
              2 \Re[T^*_{ba}\, S_{ba}].
              \end{align*}$$
              </div>
              <br>
              <div class="fragment fade-in">
                <h3>&emsp;• Spatial-temporal interference (longitudanal)</h3>
                <h3>&emsp;• Vector-Axial interference (transverse)</h3>
              </div>
              </div>

              <br><br>

              <div class="fragment fade-in">
              <h2>Continuum Final State</h2>
              <h3>&emsp;• Energy, <i>not</i> momentum, eigenstates</h3>
              <h3>&emsp;• Energy-normalised: Extra $1/\sqrt{E}$ dimension</h3>

              $$
              \int \langle\varepsilon'|\varepsilon\rangle \ {\rm d}\varepsilon = 1
              $$
              </div>

            </div>

            <div style="text-align: left; float: right; width: 57%">
              <div class="fragment fade-in" style="font-size: 1.5em">
              $$
                K^{\rm ion}(q,\omega) \equiv E_H \sum_{n_i \kappa_i}\sum_{\kappa_f}\left|{\langle{\varepsilon_f\kappa_f}\|{T^K}\|{n_i\kappa_i}\rangle}\right|^2,
              $$
              </div>

        <section data-markdown>
          <textarea data-template>
          # Orthogonality and low-q relativistic effects

          <br>
          <h2>Small momentum transfer</h2>
          <h3>&emsp;• $e^{iqr}\to 1$</h3>
          <!-- <h3>&emsp;• For vector and scalar cases:</h3> -->
          <br>
          
          <div class="fragment" style="font-size: 1.5em">
          $$\begin{align*}
          \langle f |{\color{red}t^K}| i \rangle
          \overset{\rm low\ q}{\propto}
          \langle f |{\color{red}1}| i \rangle
          &= 
          \int_0^{\infty} \left[ f_{w}(r) f_{v}(r) + g_{w}(r) g_{v}(r) \right]  {\rm d} r ~ {\color{red} = 0}
          \\
          \langle f |{\color{orange}t^K\gamma^0}| i \rangle
          \overset{\rm low\ q}{\propto}
          \langle f |{\color{orange}\gamma^0}| i \rangle
          &= 
          \int_0^{\infty} \left[ f_{w}(r) f_{v}(r) ~{\color{orange}-}~ g_{w}(r) g_{v}(r) \right]  {\rm d} r ~ {\color{orange}\sim \alpha^2}
          \end{align*}$$
          </div>
          <br> 
          <br>

          <div style="text-align: left; float: left; width: 55%">

            <div class="fragment">
              <h2>Vector</h2>
              <h3>• Goes to zero by orthogonality</h3>
              <h3>• Numerically challenging, well known</h3>
            </div>
            <br>
            <div class="fragment">
            <h3>• Common solution:</h3>
            <div style="font-size: 1.5em">
              $${\color{red}\langle f |t^K| i \rangle \to \langle f |t^K\!-\!1| i \rangle}$$
            </div>
            </div>
            <br><br>



          </div>

          <div style="text-align: center; float: right; width: 43%">
            <div class="fragment">
              <h2>Scalar</h2>
              <h3>• Relativistically suppressed</h3>
            <br>
            </div>
            <div class="fragment" style="font-size: 1.5em">
              $${\color{orange}\langle f |\gamma^0| i \rangle = -2\int_0^{\infty} g_{w}(r) g_{v}(r)\,{\rm d}r \sim \alpha^2}$$
            </div>
            <br>
            <div class="fragment">
            <h3>• Pseudoscalar/axial: even worse</h3>
            </div>
          </div>

          </textarea>
        </section>

        <!-- TEMPLATE SLIDE 4: stacked layout, equation prominent -->
        <section data-markdown>
          <textarea data-template>
          # $\gamma^5$ matrix tomfoolery

          ### Even worse: _Naive calculations can be very unstable_

          <br><br>
          <div style="text-align: left; width: 80%" class="fragment">
            <h3>• For axial-vector (temporal), and pseudo-scalar</h3>
            <h3>• Low $q$: Matrix elements of "raw" ${\color{orange}\gamma^5}$, ${\color{coral}\gamma^0\gamma^5}$</h3>
          </div>
          
          <div style="clear: both; text-align: center; width: 100%" class="fragment">
            <br>
            <div style="font-size: 1.5em">
            $$
            \begin{align*}
            {\color{orange}
            \gamma^5} ~ & {\color{orange}= i\,\alpha\,[H,\vec{\sigma}\sdot\vec{r}] - 2\gamma^5(1+\vec\sigma\!\cdot\!\vec l)} \\
            {\color{coral}\gamma^0\gamma^5} ~ & {\color{coral} = \frac{\alpha^2}{2}[H,\gamma^5]}
            \end{align*}
            $$
            <br>
            </div>
            <div class="fragment" style="display: flex; align-items: flex-start;">
              <div style="text-align: left; width: 60%;">
                <h3>• Suppressed by $\color{orange}\alpha$ and $\color{coral}\alpha^3$, respectively</h3>
                <h3>• In practice: large cancellation between order 1 terms!</h3>
                <h3>&emsp;&emsp;• Pseudoscalar ($\sim\gamma^0\gamma^5$) particularly dangerous</h3>
                <h3>• Exact relations [<a href="https://arxiv.org/abs/1404.2723">1</a>]: replace, or use as check</h3>
              </div>
              <div class="fragment" style="font-size: 1.3em" style="flex: 1; text-align: center;">
              <br> 
                $$\begin{align*}
                 {\color{orange}\langle{w}|{\gamma^5}|{v}\rangle}
                &~{\color{orange}= \frac{i\alpha\,\omega_{wv}\langle{w}|{{\hat \sigma}\!\cdot\!\vec{r}}|{v}\rangle}{1+\alpha^2\kappa_w\omega_{wv}}}
                \\~\\
                {\color{coral}\langle{w}|{i\gamma^0\gamma^5}|{v}\rangle }
                &~{\color{coral}= \frac{-\alpha^3\,\omega_{wv}^2\langle{w}|{{\hat \sigma}\!\cdot\!\vec{r}}|{v}\rangle}{2(1+\alpha^2\kappa_w\omega_{wv})}}
                \end{align*}$$
              </div>
            </div>
            <br>
            
           
          </div>

           * [1] BMR, Stadnik, Dzuba, Flambaum, Leefer, Budker, [PRL **113**, 081601](https://link.aps.org/doi/10.1103/PhysRevLett.113.081601) (2014), [[arXiv:1404.2723](https://arxiv.org/abs/1404.2723)]

          </textarea>
        </section>

          <div style="text-align: left; float: left; width: 50%">

              <h3>
                &ensp;• Exotic field may have small interaction with matter<br>
                &ensp;• Shift atomic energy levels and frequencies
              </h3>

            <br>
            <div class="fragment fade-in" data-fragment-index="1">
              <h3>Observable shift:</h3>
              <br>
              \[{\large
              \frac{\delta f}{f} = \kappa \, \phi_{\rm DM}(\vec{r},t)}
              \]
              <br>
              <br>
              <h3>
                &ensp;• $\kappa$ - model dependent parameter
              </h3>
              <h3>
                &ensp;• Calculated: high-precision atomic theory
              </h3>

            <div class="fragment fade-in" data-fragment-index="2">
              <h3>Example: variation of constants</h3>
              <br>
              \[{\large
              {\mathcal{L} = \phi F_{\mu\nu}F^{\mu\nu}}
              {\implies \alpha\to\alpha+\phi_{\rm DM}(\vec{r},t)}}

          # Space-time separated sensors
  
            * Filzinger, Caddell, Jani, Steinel, Giani, Huntemann, BMR, **Phys. Rev. Lett.** (in press), [arXiv:2312.13723](https://arxiv.org/abs/2312.13723)
  
            <br>
            <br>
  
            <div style="text-align: left; float: left; width: 50%">
  
              ### Typical local experiment:
  
              <br>
  
              $$\large
                \frac{\delta(\nu_a/\nu_b)}{(\nu_a/\nu_b)} = \phi_0 \\, ( \kappa_{a} - \kappa_b) \\, \cos(\omega t)
              $$
  
              <br>

              <div class="fragment fade-in">
              
              * Non-zero effect from two _different_ transitions only
              * Certain couplings always cancel 
              * e.g., Universal couplings

              </div>

              <br>
  
              <img src="img/Local.png" width="70%"><br>
            </div>
            
            <div style="text-align: left; float: right; width: 50%" class="fragment fade-in">
  
              ### Separated (identical) sensors:
  
              <br>
  
              <div>
              \[\large
                \frac{\delta(\nu_a/\nu_b)}{(\nu_a/\nu_b)} = \phi_0 \, \kappa \left(\cos(\omega t) -\cos(\omega t-\delta)\right) \\
                  \delta = \omega\Delta t - k_z D 
              \]
              </div>
              <br>
              <div class="fragment fade-in">
              
              * Spatial and temporal component (depends on experiment)
              *  <font color="pink">Allows access to unconstrained couplings</font>
              * Unique signals: scales with network size, daily modulation
              </div>
  
              <img src="img/Separated.png" width="70%"><br>

          ### Example: fine structure constant: $\alpha$


          <div>
            \[\large
            \omega^{A} = \underbrace{F_A(\alpha)}_{\text{Transition-specific}}
            \times \underbrace{m_e c^2\alpha^2}_{\text{Units}}
            \qquad\qquad
            \alpha = \frac{e^2}{4\pi\epsilon_0\,\hbar c}
            \]
          </div>

            \[
            \frac{\Delta\omega}{\omega} = K\frac{\Delta\alpha}{\alpha}
            \qquad\qquad\qquad
            \left(
            {\color{red}K \equiv \frac{\partial \omega}{\partial \alpha}\frac{\alpha_0}{\omega}}
            \right)
            \]

            <br>

            * In general, $K$ calculated from atomic theory
            * Difference transitions: different sensitivity

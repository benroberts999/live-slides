          ## Goal: _Universal relativistic ionisation form-factors_

                \mathcal{M} &= 
                  -ig^e g^X
                  \left[{\color{skyblue}\bar\psi_f\Gamma_e^\mu\psi_i}\right]\,
                  {\color{orange} D_{\mu\nu}(q)}\,
                  \left[{\color{orange}\bar X'(k')\Gamma_X^\nu (k)}\right] \\~\\
                \mathcal{A} &= 
                  g^X
                  \left[{\color{skyblue}\bar\psi_f\Gamma_e^\mu\psi_i}\right]\,
                  {\color{orange}\chi_\mu(q)}
              \end{align*} $$
              <br>
              </div>
              <div class="fragment" data-fragment-index="2" style="font-size: 1.0em">
              <br>
              $${\color{orange}
                \Gamma^\mu = \begin{cases}
                \gamma^\mu & \text{(V)}\\

        <section data-markdown>
          <textarea data-template>
            # Atomic Matrix elements

            <br>

            <div style="text-align: left; float: left; width: 50%">

              <h2>Wigner-Eckart theorem</h2>
              <h3>&emsp;• Spherical tensor operators $T^k_\mu$</h3>
              <h3>&emsp;• <span style="color: magenta"><i>Reduced</i> matrix element</span></h3>
              <h3>&emsp;&emsp;&emsp;• Independent of projections $m$, $\mu$</h3>

              <br><br>

              <div class="fragment" style="font-size: 1.2em">
              $$
              {\color{skyblue}\langle{bm_b}|{T^k_\mu}|{am_a}\rangle}
              =
              {\footnotesize\begin{pmatrix}
                  j_b & k & j_a \\
                  -m_b & \mu & m_a \\
              \end{pmatrix}}\,
              {\color{magenta}\langle{b}\|{T^k}\|{a}\rangle},
              $$
              </div>
              <br>
              <br>
              <div class="fragment">
              <h3>&emsp;• Simplifies complicated sums over $m$</h3>
              <br>
              <br> 
              <div style="font-size: 1.2em">
              $$
              \sum_{m_a m_b} {\color{skyblue}\langle{bm_b}|{T^K_Q}|{am_a}\rangle
              \langle{bm_b}|{S^{K'}_{Q'}}|{am_a}\rangle} \qquad\qquad\qquad\\
              \qquad\qquad\qquad
              =\frac{1}{2K+1}
              {\color{magenta}\langle{b}\|{T^K}\|{a}\rangle
              \langle{b}\|{S^{K}}\|{a}\rangle} \, \delta_{KK'}\delta_{QQ'}.
              $$
              </div>
              </div>

            </div>

            <div class="fragment" style="text-align: left; float: right; width: 50%">

              <h2>Vector Spherical Expansion</h2>
              <h3>&emsp;• $e^{iqr}$, $\vec{\alpha}\,e^{iqr}$: <i>not</i> spherical tensors</h3>
              <h3>&emsp;• $t^k$, $T_K$: <i>are</i> (multipole expansion)</h3>

              <br>

              <div class="fragment" style="font-size: 1.25em">
                $$
                \begin{align*}
                e^{i \mathbf{\vec q} \cdot \mathbf{\vec r}} 
                &\propto 
                \sum_{KQ} \, 
                 {\color{orange}{Y^*_{KQ}}{(\hat{\mathbf q})}} \,\, 
                 {\color{skyblue}t^K_{Q}(q,\mathbf{\vec r})}   
                \\
                e^{i\mathbf{\vec q}\cdot\mathbf{\vec r}}\gamma^0\mathbf{\vec \gamma}
                & \propto \sum_{KQ\,\sigma} \, 
                {\color{orange}\mathbf{\vec Y}_{KQ}^{(\sigma)*}(\hat{\mathbf{q}})} \,\, 
                {\color{skyblue}T_{KQ}^{(\sigma)}(q,\mathbf{\vec r})}
                \end{align*}
                $$
              </div>
              <div class="fragment">
              <br>
              <h3>&emsp;• Spherical Harmonics/Bessel: ${\color{skyblue}T_K\propto Y_K(\hat r) j_K(qr)}$</h3>
              </div>
              <div class="fragment">
              <h3>&emsp;• "Electric" ($\sigma=1$), "magnetic" ($\sigma=0$)</h3>
              <h3>&emsp;• "Longitudanal" ($\sigma=-1$)</h3> 
              <br>
              </div>

              <div class="fragment" style="font-size: 1.1em">
              $$
              \begin{equation*}
              \begin{split}
                  \hat{\mathbf{q}}\cdot{\color{orange}\mathbf{\vec{Y}}^{(1)}_{KQ}} &= \hat{\mathbf{q}}\cdot{\color{orange}\vec{Y}^{(0)}_{KQ}}  = 0\\
                  \hat{\mathbf{q}}\times{\color{orange}\vec{Y}^{(-1)}_{KQ}}  &= 0.
              \end{split}
              \end{equation*}
              $$
              </div>



            </div>

          </textarea>
        </section>

            # Dimensionless Atomic Ionisation Formfactors

            <br>
            <div style="text-align: left; float: left; width: 43%">

              <h2>Factors</h2>
              <div class="fragment fade-in">
              <h3>&emsp;• 10 reduced matrix elements (each K)</h3>
              <div style="font-size: 1.5em">
              $$
              \langle {\color{skyblue}f} \| 
               {\color{skyblue}t^k} {\color{red}\tilde \gamma} \| 
              {\color{skyblue}i} \rangle 
              ~,~
              \langle {\color{skyblue}f} \| 
              {\color{skyblue}T^{(\sigma)}_{K}}
              {\color{red}\tilde\gamma}\| 
              {\color{skyblue}i} \rangle 
              $$
              </div>
              
              <br>
              <div class="fragment fade-in">
              $$\begin{align*}
              |M_{ba}|^2 
              &= \sum_{m_f m_i}|\mathcal{M}_{ba}|^2\\
              &= |T_{ba}|^2 + |S_{ba}|^2 - 
              2 \Re[T^*_{ba}\, S_{ba}].
              \end{align*}$$
              </div>
              <br>
              <div class="fragment fade-in">
                <h3>&emsp;• Spatial-temporal interference (longitudanal)</h3>
                <h3>&emsp;• Vector-Axial interference (transverse)</h3>
                <h3>&emsp;• $\implies$ 13 ionisation factors (each K)</h3>
              </div>
              </div>

              <br>

              <div class="fragment fade-in">
              <h2>Continuum Final State</h2>
              <h3>&emsp;• Energy, <i>not</i> momentum, eigenstates</h3>
              <h3>&emsp;• Energy-normalised: Extra $1/\sqrt{E}$ dimension</h3>

              $$
              \int \langle\varepsilon'|\varepsilon\rangle \ {\rm d}\varepsilon = 1
              $$
              </div>

            </div>

              <div class="fragment fade-in" style="font-size: 1.5em">

                K^{\rm ion}(q,\omega) \equiv E_H \sum_{n_i \kappa_i}\sum_{\kappa_f}\left|{\langle{\varepsilon_f\kappa_f}\|{T^K}\|{n_i\kappa_i}\rangle}\right|^2,

            {\color{orange}W^\mu = (F(q), \ \mathcal{O(v/c)})}
            $$
            </div>
            <br>
            <div class="fragment" style="font-size: 1.15em; padding-left: 2em;">
            $$
              \begin{align*}
              \frac{\langle {\rm d}\sigma \ v \rangle}{dE}
              &=
              \frac{ {\color{orange}\overline{\sigma}_e} \ c}{2 m_e c^2}
              \int dv \ {\color{green}\frac{f_\chi(v)}{v/c}}
              \int_{q_-}^{q_+} a_0^2 \  q \  dq \  {\color{orange}\left|F(q)\right|^2} \ {\color{skyblue}K(E,q)}\\
              {\color{skyblue}K(E,q)} & ~ {\color{skyblue} =  E_H \ \sum_{\kappa_f\kappa_i n_i}\sum_{k}(2k+1)
              \left|\langle \varepsilon_f \| t^{k} \| n \rangle\right|^2}
              \end{align*}
            $$
            </div>
            <br>
            <h3 class="fragment">2. &nbsp; <b>Photo-absorption</b> &emsp; — &emsp; $\gamma + A \to A^+ + e^-$</h3>
            <br>
            <div class="fragment" style="font-size: 1.15em; padding-left: 2em;">
            $$
            {\color{orange}W^\mu = (0, \ \mathbf{\vec \epsilon})}
            $$
            </div>
            <br>
            <div class="fragment" style="font-size: 1.15em; padding-left: 2em;">
              $$\begin{align*}
              \sigma_\gamma
              &=  \frac{2\pi^2 a_0^2  }{\alpha } \frac{E_H  }{\hbar \omega } \
              {\color{skyblue}K(\omega, q=\omega)}\\
              {\color{skyblue} K(\omega)} & ~{\color{skyblue}  =
               E_H \ \sum_{k}(2k+1)  \sum_{\sigma=0,1}
              \left|\langle \varepsilon_f \| T_{k}^{(\sigma)} \| n \rangle\right|^2}
              \end{align*}$$
            </div>
            <h4 class="fragment">&emsp;• Orthogonality between transferse $\vec{\epsilon}$ and $\vec Y^{(-1)}$ removes $\sigma=-1$ longitudanal contribution</h4>
          </div>

        <section data-markdown>
          <textarea data-template>
          # Exponential Suppression and lack thereof


          <br>
          <div style="overflow: hidden">
          <div style="text-align: left; float: left; width: 50%">
            <h3>Typical scale</h3>
            <h4>&emsp;• $\Delta E \sim {\rm keV}$</h4>
            <h4>&emsp;• $q\sim {\rm MeV}$</h4>
            <h4>&emsp;• Atomic scale: $a_0^{-1} \sim 4\,{\rm keV}$</h4>
          </div>

          <div style="text-align: center; float: right; width: 50%; font-size: 1.5em">
          $$
            K = \left|\langle {\rm Xe} | e^{-i\mathbf{\vec{q}}\cdot\mathbf{\vec{r}}} | {\rm Xe}^{+}+e^-\rangle\right|^2
          $$
          <br>
          $$
            q_{\rm min} = m_\chi v - \sqrt{m_\chi^2 v^2 - 2m_\chi E}
          $$
          </div>
          </div>

          <br><br>

          <div style="overflow: hidden">
          <div class="fragment" style="text-align: left; float: left; width: 48%">
            <h2>Simple Estimate</h2>
            <h3>&emsp;• $r\sim q^{-1}\sim 10^{-3}a_B$ — close to nucleus</h3>
            <h3>&emsp;• $s$-states ($l=0$): non-zero $\psi(0)$</h3>
            <h3>&emsp;• Oscillator-like: $\psi\sim A e^{-\beta r^2}$</h3>

            <br>

            <div style="font-size: 1.2em">
            $${\color{red}\langle f | e^{-i\mathbf{\vec{q}}\cdot\mathbf{\vec{r}}} | i \rangle \propto e^{-q^2/8\beta}}$$
            </div>
          </div>

          <div class="fragment" style="text-align: left; float: right; width: 50%">
            <h2>Non-relativistic Coulomb</h2>

            <div style="font-size: 1.05em">
            $$\psi\sim A r^l \left[1-\frac{Z}{l+1}r+\cdots\right]$$
            </div>

            <h3>&emsp;• Cusp — strongest for $l=0$</h3>
            <h3>&emsp;• Lowest-order: $\sim\int r^{l+l'+2}j_L(qr)\,dr = 0$</h3>
            <div class="fragment">
            <h3>&emsp;• Next term: $\propto Z\,q^{-(l+l'+4)}$</h3>
            <h3>&emsp;• ${\color{green}d\sigma\sim q^{-8}}$ &nbsp;—&nbsp; $s$-waves dominate</h3>
            </div>
          </div>
          </div>

          <div style="clear: both; text-align: center" class="fragment">
            <br>
            <h4>Eighth power is still eighth power ... but better than exponential</h4>
            <br>
            <div style="font-size: 0.85em; text-align: left; padding-left: 2em">
              &bull; BMR, Flambaum, and Gribakin, <a href="https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.116.023201">Phys. Rev. Lett. 116, 023201</a> (2016), <a href="http://arxiv.org/abs/1509.09044">[arXiv:1509.09044]</a>
            </div>
          </div>

          </textarea>
        </section>

          # Dirac Wavefunctions

          <div style="text-align: left; width: 90%; margin: auto">
            <h2>Relativistic Case</h2>

            <div style="font-size: 1.35em">
            $$\psi\sim A r^{\gamma-1} \left[\gamma-\kappa+Br+\cdots\right] \qquad \gamma=\sqrt{\kappa^2-(Z\alpha)^2}\approx1-(Z\alpha)^2$$
            </div>
            <br>

            <h3>&emsp;• $\kappa=-1$ for $s$-states, $\kappa=1$ for $p_{1/2}$</h3>
            <div class = "fragment">
            <h3>&emsp;• Lowest-order term: $\sim\int r^{\gamma+\gamma'}j_L(qr)\,dr$ — <b>non-zero!</b></h3>
            </div>
            <br>
            <div class = "fragment" style="font-size: 1.85em">
            $$
              {\color{green} d\sigma\sim q^{-6+2(Z\alpha)^2} }
            $$
            </div>
            <br>
            
          </div>

          <br>

          <div class = "fragment" style="text-align: left; float: left; width: 40%">
            <img src="img/rel-factor.png" width="95%"><br>
          </div>

          <div class = "fragment" style="text-align: left; float: right; width: 60%">
            <div style="font-size: 1.2em">
            $$e^{-q^2} \to q^{-8} \to q^{-6} \to {\color{orange}q^{-6+2(Z\alpha)^2}} \approx q^{-5.7}$$

            <h3>&emsp;• cf: Shao-Feng Ge's talk</h3>
            <h3>&emsp;• $s,p_{1/2}$-waves: $d\sigma\sim q^{-6+2(Z\alpha)^2} \simeq q^{-5.7...}$ for Xe, I</h3>

            <div style="font-size: 0.85em; text-align: left; padding-left: 2em">

          # Sommerfeld Enhancement

          <div class="fragment fade-in">
          <br>
          <div style="overflow: hidden">
          <div style="text-align: left; float: left; width: 50%">

          For large $p$ ($|p|=\sqrt{2m_e\varepsilon}$), plane waves should be OK?

          $$\langle\mathbf{\vec{r}}|\mathbf{\vec{p}}\rangle = e^{i\mathbf{\vec{p}}\cdot\mathbf{\vec{r}}/\hbar}$$

          But high $q$ means low $r$ — close to nucleus. Continuum _energy_ eigenstates enhanced near origin:
          <div style="font-size: 1.1em">
          $${\color{red}\int_{\varepsilon-\delta\varepsilon}^{\varepsilon+\delta\varepsilon}\langle\varepsilon'jlm|\varepsilon jlm\rangle\,d\varepsilon' = 1}$$
          </div>
          </div>
          <div class="fragment" style="text-align: left; float: right; width: 48%">
          <br>
          <div style="font-size: 1.0em">
          $$\frac{K_{ns_{1/2}}}{K^{\rm pw}_{ns_{1/2}}}\Bigg|_{r\to0} \approx \frac{8\pi Z}{\left[1-e^{-2\pi Z/|p'|}\right]n^3|p'|}$$
          </div>
          <h3>&emsp;• Orders of magnitude enhancement</h3>
          </div>
          </div>
          </div>

          <div class="fragment fade-in">
          <br>
          <h2>Bound states: Low-$r$ Scaling</h2>

          Similar enhancement for bound states
          <br>
          <br>

          <div style="overflow: hidden">
          <div class="fragment" style="text-align: left; float: left; width: 50%">
          <h3>&emsp;• Common: H-like wavefunctions with $Z_{\rm eff}$</h3>
          <div style="font-size: 1.25em">
          $$Z_{\rm eff} = n\sqrt{|E|/R_y}$$
          </div>
          <br>
          <h3>&emsp;• Works well at intermediate to large $r$</h3>
          <h3>&emsp;• <b>Fails</b> at low $r$</h3>
          </div>
          <div class="fragment" style="text-align: left; float: right; width: 48%">
          <h3>&emsp;• H-like: $\psi(0)^2\sim Z_{\rm eff}^3$</h3>
          <h3>&emsp;• True: $\psi_{\rm inner}(0)^2\sim Z^3$, $\psi_{\rm outer}(0)^2\sim Z^1$</h3>
          <h3>&emsp;• Orders of magnitude "enhancement"</h3>
          </div>
          </div>
          </div>

          </textarea>
        </section>

          # Solution: Relativistic Atomic Wavefunctions

          <br>

          <div class = "fragment" style="text-align: left; float: left; width: 52%">
            <h2>Relativistic Hartree-Fock</h2>
            <h3>&emsp;• Dirac equation in self-consistent field</h3>
            <h3>&emsp;• Continuum <em>energy</em> eigenstates</h3>
            <br>
            <div style="font-size: 1.1em">
            $$
              H^{\rm RHF} = c\gamma^0\boldsymbol{\vec \gamma}\!\cdot\!\mathbf{\vec p}
              + V_{\rm nuc} + (\gamma^0-1) c^2 + V^{\rm HF} + \delta V
            $$
            <br>
            $$
              \psi_{n\kappa m} = \frac{1}{r}
              \begin{pmatrix} f(r)\,|\kappa,m\rangle \\ i\,g(r)\,|\!-\!\kappa,m\rangle \end{pmatrix}
            $$
            <br>
            <div class = "fragment">
            <h4>&emsp;• $f(r)$ -- "large" radial Dirac component</h4>
            <h4>&emsp;• $g(r)$ -- "small" relativistic $\sim {\alpha}(\vec{\sigma}\!\cdot\!\vec{p}) f$</h4>
            <h4>&emsp;• $|\kappa,m\rangle$ -- two-component spherical spinor</h4>
            <h4>&emsp;• $V^{\rm HF}$ -- Non-local hartree-Fock potential</h4>
            <h4>&emsp;• Correlation corrections: $\delta V$ (RPA)</h4>
            </div>
            </div>
          </div>

          <div class="fragment" style="text-align: center; float: right; width: 45%">
            <br>
            <img src="img/ampsci.png" width="95%"><br>
            <font size="3"><a href="https://github.com/benroberts999/ampsci">github.com/benroberts999/ampsci</a></font>
            <br><br>
            <h4>&emsp;• Existing code: temporal part</h4>
            <h4>&emsp;• Full form factors: coded, release soon</h4>
          </div>

          </textarea>
        </section>

          # Orthogonality and low-q relativistic effects

          <br>
          <h2>Small momentum transfer</h2>
          <h3>&emsp;• $e^{iqr}\to 1$</h3>
          <!-- <h3>&emsp;• For vector and scalar cases:</h3> -->
          <br>
          
          <div class="fragment" style="font-size: 1.5em">
          $$\begin{align*}
          \langle f |{\color{red}t^K}| i \rangle
          \overset{\rm low\ q}{\propto}
          \langle f |{\color{red}1}| i \rangle
          &= 
          \int_0^{\infty} \left[ f_{w}(r) f_{v}(r) + g_{w}(r) g_{v}(r) \right]  {\rm d} r ~ {\color{red} = 0}
          \\
          \langle f |{\color{orange}t^K\gamma^0}| i \rangle
          \overset{\rm low\ q}{\propto}
          \langle f |{\color{orange}\gamma^0}| i \rangle
          &= 
          \int_0^{\infty} \left[ f_{w}(r) f_{v}(r) ~{\color{orange}-}~ g_{w}(r) g_{v}(r) \right]  {\rm d} r ~ {\color{orange}\sim \alpha^2}
          \end{align*}$$
          </div>
          <br> 
          <br>

          <div style="text-align: left; float: left; width: 55%">

            <div class="fragment">
              <h2>Vector</h2>
              <h3>• Goes to zero by orthogonality</h3>
              <h3>• Numerically challenging, well known</h3>
            </div>
            <br>
            <div class="fragment">
            <h3>• Common solution:</h3>
            <div style="font-size: 1.5em">
              $${\color{red}\langle f |t^K| i \rangle \to \langle f |t^K\!-\!1| i \rangle}$$
            </div>
            </div>
            <br><br>



          </div>

          <div style="text-align: center; float: right; width: 43%">
            <div class="fragment">
              <h2>Scalar</h2>
              <h3>• Relativistically suppressed</h3>
            <br>
            </div>
            <div class="fragment" style="font-size: 1.5em">
              $${\color{orange}\langle f |\gamma^0| i \rangle = -2\int_0^{\infty} g_{w}(r) g_{v}(r)\,{\rm d}r \sim \alpha^2}$$
            </div>
            <br>
            <div class="fragment">
            <h3>• Pseudoscalar/axial: even worse</h3>
            </div>
          </div>

          </textarea>
        </section>

        <section data-markdown>
          <textarea data-template>
          # $\gamma^5$ matrix tomfoolery

          ### Even worse: _Naive calculations can be very unstable_

          <br><br>
          <div style="text-align: left; width: 80%" class="fragment">
            <h3>• For axial-vector (temporal), and pseudo-scalar</h3>
            <h3>• Low $q$: Matrix elements of "raw" ${\color{orange}\gamma^5}$, ${\color{coral}\gamma^0\gamma^5}$</h3>
          </div>
          
          <div style="clear: both; text-align: center; width: 100%" class="fragment">
            <br>
            <div style="font-size: 1.5em">
            $$
            \begin{align*}
            {\color{orange}
            \gamma^5} ~ & {\color{orange}= i\,\alpha\,[H,\vec{\sigma}\sdot\vec{r}] - 2\gamma^5(1+\vec\sigma\!\cdot\!\vec l)} \\
            {\color{coral}\gamma^0\gamma^5} ~ & {\color{coral} = \frac{\alpha^2}{2}[H,\gamma^5]}
            \end{align*}
            $$
            <br>
            </div>
            <div class="fragment" style="display: flex; align-items: flex-start;">
              <div style="text-align: left; width: 60%;">
                <h3>• Suppressed by $\color{orange}\alpha$ and $\color{coral}\alpha^3$, respectively</h3>
                <h3>• In practice: large cancellation between order 1 terms!</h3>
                <h3>&emsp;&emsp;• Pseudoscalar ($\sim\gamma^0\gamma^5$) particularly dangerous</h3>
                <h3>• Exact relations [<a href="https://arxiv.org/abs/1404.2723">1</a>]: replace, or use as check</h3>
              </div>
              <div class="fragment" style="font-size: 1.3em" style="flex: 1; text-align: center;">
              <br> 
                $$\begin{align*}
                 {\color{orange}\langle{w}|{\gamma^5}|{v}\rangle}
                &~{\color{orange}= \frac{i\alpha\,\omega_{wv}\langle{w}|{ {\hat \sigma}\!\cdot\!\vec{r}}|{v}\rangle}{1+\alpha^2\kappa_w\omega_{wv}}}
                \\~\\
                {\color{coral}\langle{w}|{i\gamma^0\gamma^5}|{v}\rangle }
                &~{\color{coral}= \frac{-\alpha^3\,\omega_{wv}^2\langle{w}|{ {\hat \sigma}\!\cdot\!\vec{r}}|{v}\rangle}{2(1+\alpha^2\kappa_w\omega_{wv})}}
                \end{align*}$$
              </div>
            </div>
            <br>
            
           
          </div>

           * [1] BMR, Stadnik, Dzuba, Flambaum, Leefer, Budker, [PRL **113**, 081601](https://link.aps.org/doi/10.1103/PhysRevLett.113.081601) (2014), [[arXiv:1404.2723](https://arxiv.org/abs/1404.2723)]

          </textarea>
        </section>

        <section data-markdown data-visibility="uncounted">
          <textarea data-template>
            # Explicit formulas: Matrix elements

            <br>

            <div style="font-size: 1.3em">
            $$
            \begin{align*}
            T^{(+1)}_{KQ} 
                &= \left[(K+1)\tfrac{j_{K}(qr)}{qr} - j_{K+1}(qr)\right]\vec{\alpha}\!\cdot\!\vec{C}^{(+1)}_{KQ}
                +
                \tfrac{j_{K}(qr)}{qr}\,\sqrt{K(K+1)}\,\vec{\alpha}\!\cdot\!\vec{C}^{(-1)}_{KQ} 
                \\
            T^{(0)}_{KQ} &= j_K(qr)\, \vec{\alpha}\!\cdot\!\vec{C}^{(0)}_{KQ} \\
            T^{(-1)}_{KQ} 
                &= -\tfrac{j_K(qr)}{qr}\,\sqrt{K(K+1)}\,\vec{\alpha}\!\cdot\!\vec{C}^{(+1)}_{KQ}
                -
                \left[K\tfrac{j_K(qr)}{qr}-j_{K+1}(qr)\right]\vec{\alpha}\!\cdot\!\vec{C}^{(-1)}_{KQ} .
            \end{align*}
            $$
            </div>

            <br>

            <div style="text-align: left; float: left; width: 40%">
            <div style="font-size: 1.0em">
              $$\begin{align*}
              \langle n_w\kappa_w \| t^K \| n_v\kappa_v \rangle
              &= R^{(+)}_{wv}[j_K] \, \langle \kappa_w \| C^K \| \kappa_v \rangle\\
              \langle n_w\kappa_w \| t^K \gamma^0 \| n_v\kappa_v \rangle
              &= R^{(-)}_{wv}[j_K] \, \langle \kappa_w \| C^K \| \kappa_v \rangle\\
              \langle n_w\kappa_w \| t^K \gamma^5 \| n_v\kappa_v \rangle
              &= iP^{(-)}_{wv}[j_K] \, \langle \kappa_w \| C^K \| {-\kappa_v} \rangle\\
              \langle n_w\kappa_w \| t^K i\gamma^0\gamma^5 \| n_v\kappa_v \rangle
              &= -P^{(+)}_{wv}[j_K] \, \langle \kappa_w \| C^K \| {-\kappa_v} \rangle
              \end{align*}$$
            </div>
            <br>
            <div style="font-size: 1.0em">
              $$\begin{align*}
              R_{wv}^{(\pm)}[h] &\equiv
              \int_0^{\infty} \left[ f_{w} f_{v} \pm g_{w} g_{v} \right] h \, dr \\
              P_{wv}^{(\pm)}[h] &\equiv
              \int_0^{\infty} \left[ f_{w} g_{v} \pm g_{w} f_{v} \right] h \, dr
              \end{align*}$$
            </div>
            <br>
            </div>

            <div style="text-align: left; float: right; width: 60%">
            <div style="font-size: 0.95em">
              $$\begin{align*}
              \langle n_w\kappa_w \| T^{\,(+1)}_{K} \| n_v\kappa_v \rangle
              &= i\sqrt{\tfrac{K+1}{K}}\left[
              (\kappa_w-\kappa_v)
              P^{(+)}_{wv}\!\left[\tfrac{j_K}{qr}-\tfrac{j_{K+1}}{K+1}\right]
              - KP^{(-)}_{wv}\!\left[\tfrac{j_K}{qr}\right]
              \right]C^K_{wv}\\
              \langle n_b\kappa_b \| T^{\,(0)}_{K} \| n_a\kappa_a \rangle
              &= \frac{-i}{\sqrt{K(K+1)}}\,(\kappa_w+\kappa_v)\,P^{(+)}_{ba}[j_K]\,C^K_{w,-v}\\
              \langle n_w\kappa_w \| T^{\,(-1)}_{K} \| n_v\kappa_v \rangle
              &= -i\left[
              (\kappa_w-\kappa_v)\,P^{(+)}_{wv}\!\left[\tfrac{j_K}{qr}\right]
              - P^{(-)}_{wv}\!\left[K\tfrac{j_K}{qr}-j_{K+1}\right]
              \right]C^K_{wv}
              \end{align*}$$
              </div>
              <div style="font-size: 0.95em">
              $$\begin{align*}
              \langle n_w\kappa_w \| T^{\,(+1)}_{K}\gamma^5 \| n_v\kappa_v \rangle
              &= \sqrt{\tfrac{K+1}{K}}\left[
              (\kappa_w+\kappa_v)
              R^{(-)}_{wv}\!\left[\tfrac{j_K}{qr}-\tfrac{j_{K+1}}{K+1}\right]
              - KR^{(+)}_{wv}\!\left[\tfrac{j_K}{qr}\right]
              \right]C^K_{w,-v}\\
              \langle n_b\kappa_b \| T^{\,(0)}_{K}\gamma^5 \| n_a\kappa_a \rangle
              &= \frac{-1}{\sqrt{K(K+1)}}\,(\kappa_w-\kappa_v)\,R^{(-)}_{ba}[j_K]\,C^K_{wv}\\
              \langle n_w\kappa_w \| T^{\,(-1)}_{K}\gamma^5 \| n_v\kappa_v \rangle
              &= -\left[
              (\kappa_w+\kappa_v)\,R^{(-)}_{wv}\!\left[\tfrac{j_K}{qr}\right]
              - R^{(+)}_{wv}\!\left[K\tfrac{j_K}{qr}-j_{K+1}\right]
              \right]C^K_{w,-v}
              \end{align*}$$
            </div>
            </div>
            

            <div style="clear: both; font-size: 1.0em">
            <br>
            $$C^K_{ab} \equiv \langle \kappa_a \| C^K \| \kappa_b \rangle
              = (-1)^{j_a+1/2}\sqrt{(2j_a{+}1)(2j_b{+}1)}
              \begin{pmatrix} j_a & K & j_b \\ \tfrac{1}{2} & 0 & -\tfrac{1}{2} \end{pmatrix}
              \pi(l_a{+}K{+}l_b)$$
            </div>
